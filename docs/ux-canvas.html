<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alfred Android UX canvas</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #080b12; color: #f5f7ff; }
    .phone { width: min(390px, 100vw); min-height: 760px; box-sizing: border-box; padding: 24px 16px; background: radial-gradient(circle at 50% 18%, #183a63, #10131d 42%); }
    header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
    .model { border: 1px solid #6ba4e2; border-radius: 999px; padding: 8px 12px; font-size: .8rem; color: #b9d8ff; }
    .orb { width: 82px; height: 82px; margin: 72px auto 34px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #d7efff, #3187df 34%, #0a3d78 72%); box-shadow: 0 0 52px #2088e888; }
    .chat { display: grid; gap: 12px; }
    .bubble { max-width: 88%; padding: 13px; border-radius: 16px; background: #252a35; line-height: 1.4; }
    .user { justify-self: end; background: #1267b4; }
    .input { position: sticky; top: calc(100vh - 84px); display: flex; gap: 8px; margin-top: 36px; padding: 8px; border: 1px solid #36445a; border-radius: 24px; background: #171c27; }
    input { flex: 1; border: 0; outline: 0; background: transparent; color: inherit; padding: 8px; }
    button { border: 0; border-radius: 50%; width: 38px; background: #3b9df4; color: #fff; font-weight: 700; }
  </style>
</head>
<body>
  <main class="phone">
    <header><span>☰ &nbsp; A.L.F.R.E.D.</span><span class="model">Gemma 4 26B</span></header>
    <div class="orb" aria-hidden="true"></div>
    <section class="chat" aria-label="Conversation preview">
      <article class="bubble">I can help you plan, search your connected knowledge, or work locally with Gemma.</article>
      <article class="bubble user">Give me a focused plan for today.</article>
      <article class="bubble">Here’s a short, practical plan with your next action first.</article>
    </section>
    <form class="input"><input aria-label="Message Alfred" placeholder="Ask anything"><button type="button">↑</button></form>
  </main>
</body>
</html>
